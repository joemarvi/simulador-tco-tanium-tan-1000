<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFICIAL TANIUM SIMULATION - TCO</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Free via CDN (funciona para todos os ícones free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <h1>OFFICIAL SIMULADO TANIUM TCO</h1>

            <div class="exam-info">
                <div class="timer">
                    <i class="fa-solid fa-clock"></i> Tempo restante:
                    <span id="time">105:00</span>
                </div>
                <div class="score-info">
                    <i class="fa-solid fa-list-ol"></i> Questões:
                    <span id="totalQuestions">0</span>
                </div>
                <div class="answered-info">
                    <i class="fa-solid fa-check-circle"></i> Respondidas:
                    <span id="answeredCount">0</span>
                </div>
                <div class="mode-info">
                    <i class="fa-solid fa-book"></i> Modo Estudo:
                    <span id="studyModeStatus">Desativado</span>
                </div>
            </div>

            <div class="progressbar">
                <div class="progress" id="progress"></div>
            </div>
        </header>

        <!-- TOP CONTROLS -->
        <section class="top-controls">
            <button type="button" id="toggleStudyMode">
                <i class="fa-solid fa-book"></i> Ativar modo estudo
            </button>

            <button type="button" id="openStats">
                <i class="fa-solid fa-chart-bar"></i> Ver estatísticas
            </button>

            <button type="button" id="questionNavigator">
                <i class="fa-solid fa-list"></i> Navegar pelas questões
            </button>
        </section>

        <!-- QUESTION NAVIGATOR OVERLAY -->
        <div id="navigatorOverlay" class="overlay" style="display:none;">
            <div class="overlay-content">
                <h2><i class="fa-solid fa-list"></i> Navegação pelas Questões</h2>
                <div id="navigatorContainer"></div>
                <div class="overlay-buttons">
                    <button type="button" id="closeNavigator"><i class="fa-solid fa-times"></i> Fechar</button>
                </div>
            </div>
        </div>

        <!-- PAUSE OVERLAY -->
        <div id="pauseOverlay" class="overlay" style="display:none;">
            <div class="overlay-content">
                <h2><i class="fa-solid fa-pause-circle"></i> Prova Pausada</h2>
                <p>A prova está pausada.</p>
                <div class="overlay-buttons">
                    <button type="button" id="resumeOverlay"><i class="fa-solid fa-play"></i> Retomar prova</button>
                    <button type="button" id="restartOverlay"><i class="fa-solid fa-redo"></i> Reiniciar prova</button>
                </div>
            </div>
        </div>

        <!-- WARNING OVERLAY -->
        <div id="warningOverlay" class="overlay" style="display:none;">
            <div class="overlay-content">
                <h2><i class="fa-solid fa-triangle-exclamation"></i> Atenção</h2>
                <p>Você ainda não respondeu todas as questões.</p>
                <div class="overlay-buttons">
                    <button type="button" id="closeWarning"><i class="fa-solid fa-arrow-right"></i> Continuar
                        prova</button>
                </div>
            </div>
        </div>

        <!-- STATISTICS OVERLAY -->
        <div id="statsOverlay" class="overlay" style="display:none;">
            <div class="overlay-content stats-box">
                <h2><i class="fa-solid fa-chart-bar"></i> Estatísticas de Desempenho</h2>
                <p>Desempenho por tema:</p>
                <div id="statsContainer"></div>
                <div class="overlay-buttons">
                    <button type="button" id="closeStats"><i class="fa-solid fa-times"></i> Fechar</button>
                </div>
            </div>
        </div>

        <!-- QUIZ -->
        <main>
            <form id="quiz" autocomplete="off"></form>
        </main>

        <!-- STUDY MODE EXPLANATION -->
        <section id="studyExplanation" class="study-panel" style="display:none;">
            <h3><i class="fa-solid fa-book-open"></i> Explicação da resposta</h3>
            <div id="explanationContent"></div>
        </section>

        <!-- CONTROLS -->
        <footer>
            <div class="buttons">
                <button type="button" id="pause"><i class="fa-solid fa-pause"></i> Pausar tentativa</button>
                <button type="button" id="finish"><i class="fa-solid fa-check"></i> Finalizar prova</button>
                <button type="button" id="restart"><i class="fa-solid fa-redo"></i> Refazer prova</button>
            </div>
        </footer>

        <!-- RESULT -->
        <section id="result"></section>

    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>

</body>

</html>
